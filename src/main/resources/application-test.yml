spring:
  datasource:
    url: jdbc:h2:mem:experiencia_sumaq;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/test
  thymeleaf:
    cache: false
