spring:
  application:
    name: Experiencia Sumaq
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/experiencia_sumaq?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/${spring.profiles.active}
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

info:
  application:
    name: Experiencia Sumaq
    description: Sistema web de pedidos y gestión operativa
    java-target: 21

logging:
  config: classpath:logback-spring.xml
  level:
    root: ${LOG_LEVEL:INFO}
