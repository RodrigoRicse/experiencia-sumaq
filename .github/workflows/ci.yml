name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maven:
    name: Java 21 / Maven
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Habilitar Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw --batch-mode --no-transfer-progress compile

      - name: Ejecutar pruebas
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Empaquetar
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Publicar JAR de CI
        uses: actions/upload-artifact@v7
        with:
          name: experiencia-sumaq-${{ github.sha }}
          path: target/experiencia-sumaq-*.jar
          if-no-files-found: error
          retention-days: 7
